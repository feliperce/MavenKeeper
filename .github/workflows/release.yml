name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (without leading v)'
        required: true
        default: '0.0.0-dev'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            task: packageDmg
            artifact_path: composeApp/build/compose/binaries/main/dmg
            artifact_name: macos-dmg
          - os: windows-latest
            task: packageMsi
            artifact_path: composeApp/build/compose/binaries/main/msi
            artifact_name: windows-msi
          - os: ubuntu-latest
            task: packageDeb
            artifact_path: composeApp/build/compose/binaries/main/deb
            artifact_name: linux-deb

    steps:
      - uses: actions/checkout@v6

      - name: Resolve app version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build installer
        shell: bash
        run: ./gradlew :composeApp:${{ matrix.task }} -PappVersion=${{ steps.version.outputs.value }} --stacktrace

      - name: Dump jpackage logs on failure
        if: failure()
        shell: bash
        run: |
          logs_dir=composeApp/build/compose/logs
          if [ ! -d "$logs_dir" ]; then
            echo "No jpackage log directory at $logs_dir"
            exit 0
          fi
          find "$logs_dir" -type f -name '*.txt' -print0 | while IFS= read -r -d '' f; do
            echo "===== $f ====="
            cat "$f"
          done

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Download installers
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
