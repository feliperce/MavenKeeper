name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            task: packageDmg
            artifact_path: composeApp/build/compose/binaries/main/dmg
            artifact_name: macos-dmg
          - os: windows-latest
            task: packageMsi
            artifact_path: composeApp/build/compose/binaries/main/msi
            artifact_name: windows-msi
          - os: ubuntu-latest
            task: packageDeb
            artifact_path: composeApp/build/compose/binaries/main/deb
            artifact_name: linux-deb

    steps:
      - uses: actions/checkout@v4

      - name: Resolve app version from tag
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build installer
        shell: bash
        run: ./gradlew :composeApp:${{ matrix.task }} -PappVersion=${{ steps.version.outputs.value }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
